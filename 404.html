<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Page Not Found</title>
    <!-- This line does the actual redirect. 0 is the delay in seconds. -->
    <meta http-equiv="refresh" content="0; URL='https://www.estelledesigns.co.uk/'" />
  </head>
  <body>
    <p>Redirecting to home page...</p>
    <script>
      // Fallback redirect in case the meta tag fails
      window.location.href = "/";
    </script>
  </body>
</html>
